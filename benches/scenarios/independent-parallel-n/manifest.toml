# Scenario 1: independent-parallel-n
# docs/eval-benchmarks.md § Scenario 1.
#
# N independent doc-page tasks with no shared files. Measures coordination
# overhead vs. actual parallelism. Pareto target: ygg-N approaches (4×) the
# wall-clock of vanilla-single while keeping pass^k high.

id = "independent-parallel-n"
title = "Independent parallel — throughput baseline"
default_parallelism = 4

# Each task creates one markdown doc page.
[[tasks]]
id    = "api-retry"
title = "Add docs/topics/api-retry.md"
prompt = """
Create the file docs/topics/api-retry.md with the following content. Do not
add anything else; do not modify any other file. Commit with message
"docs: add api-retry topic page".

```
